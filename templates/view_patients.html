<!DOCTYPE html>
<html>

<head>

    <title>View Patients</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="overlay">

<div class="login-box doctor-box">

<h1>🧑 Patient List</h1>

<br>

<table border="1" width="100%" cellspacing="0" cellpadding="20">

<tr>

<th>ID</th>

<th>Patient Name</th>

<th>Age</th>

<th>Gender</th>

<th>Phone</th>

<th>Disease</th>

<th>Actions</th>

</tr>

{% for patient in patients %}

<tr>

<td>{{ patient[0] }}</td>

<td>{{ patient[1] }}</td>

<td>{{ patient[2] }}</td>

<td>{{ patient[3] }}</td>

<td>{{ patient[4] }}</td>

<td>{{ patient[5] }}</td>

<td>

<a href="/edit_patient/{{ patient[0] }}">
<button class="edit-btn">

✏️ Edit

</button>

</a>

<a href="/delete_patient/{{ patient[0] }}">
<button class="delete-btn">

🗑 Delete

</button>

</a>

</td>

</tr>

{% endfor %}

</table>

<br><br>

<a href="/dashboard">

<button>

Back to Dashboard

</button>

</a>

</div>

</div>

</body>

</html>
